spring:
  application:
    name: risk-register-import-export-tool-backend

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/riskdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: mySecretKeyForJwtTokenGeneration123456
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
    issuer: risk-register-app
